version: '3.4'

services:
  trade-monitor:
    image: congressional-trade-monitor
    build:
      context: .
      dockerfile: ./DockerFile
    env_file:
      - .env
    command: ["sh", "-c", "pip install debugpy -t /tmp && python /tmp/debugpy --wait-for-client --listen 0.0.0.0:5678 app.py"]
    ports:
      - 5001:5001
      - 5678:5678
